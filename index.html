<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Maintenance Log</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff; --accent2: #3fb950;
  --warn: #d29922; --danger: #f85149; --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Nav */
.nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.nav h1 { font-size: 20px; font-weight: 600; }
.nav h1 span { color: var(--accent); }
.vehicle-tabs { display: flex; gap: 8px; margin-left: auto; }
.vehicle-tab { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 14px; transition: all 0.2s; }
.vehicle-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.vehicle-tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }

/* Vehicle Header */
.vehicle-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.vehicle-header .field { }
.vehicle-header .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.vehicle-header .value { font-size: 18px; font-weight: 600; margin-top: 4px; }
.vehicle-header .cost { color: var(--accent2); }

/* Stats Bar */
.stats-bar { display: flex; gap: 16px; margin: 0 24px 24px; flex-wrap: wrap; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; flex: 1; min-width: 150px; }
.stat-card .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
.stat-card .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }
.stat-card .stat-value.green, .stat-card .green { color: var(--accent2); }
.stat-card .stat-value.blue, .stat-card .blue { color: var(--accent); }
.stat-card .stat-value.warn, .stat-card .warn { color: var(--warn); }
.stat-card .stat-value.danger, .stat-card .danger { color: var(--danger); }

/* Controls */
.controls { display: flex; gap: 12px; margin: 0 24px 16px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 200px; padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; outline: none; }
.search-box:focus { border-color: var(--accent); }
.btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #4c9aed; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; transition: background 0.2s; }
.btn-icon:hover { background: var(--surface2); }
.filter-btn { padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 13px; }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Table */
.table-container { margin: 0 24px 24px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { color: var(--text); }
th .sort-arrow { margin-left: 4px; opacity: 0.3; }
th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
td { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 14px; }
tr:hover { background: var(--surface2); }
.done-cell { text-align: center; }
.done-check { color: var(--accent2); font-size: 18px; }
.done-pending { color: var(--warn); font-size: 18px; }
.cost-cell { text-align: right; font-weight: 500; white-space: nowrap; }
.date-cell { white-space: nowrap; }
.notes-cell { max-width: 300px; font-size: 13px; color: var(--text-dim); }
.km-cell { text-align: right; white-space: nowrap; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center; padding: 24px; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 18px; }
.modal-close { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
.modal-body { padding: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* Receipt cell */
.receipt-cell { text-align: center; white-space: nowrap; position: relative; }
.upload-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
.receipt-thumb { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 1px solid var(--border); transition: border-color 0.2s; vertical-align: middle; }
.receipt-thumb:hover { border-color: var(--accent); }
.receipt-badge { display: inline-flex; align-items: center; gap: 4px; }
.receipt-count { font-size: 11px; color: var(--accent); font-weight: 600; }

/* Receipt lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; justify-content: center; align-items: center; flex-direction: column; gap: 12px; padding: 24px; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 90vw; max-height: 75vh; border-radius: 8px; object-fit: contain; }
.lightbox-info { color: var(--text-dim); font-size: 14px; text-align: center; }
.lightbox-nav { display: flex; gap: 12px; align-items: center; }
.lightbox-nav button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.lightbox-nav button:hover { border-color: var(--accent); }
.lightbox-close { position: absolute; top: 16px; right: 24px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; }
.lightbox-delete { background: transparent !important; color: var(--danger) !important; border-color: var(--danger) !important; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-dim); }
.spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile */
@media (max-width: 768px) {
  .nav { flex-wrap: wrap; padding: 12px 16px; }
  .vehicle-tabs { margin-left: 0; width: 100%; }
  .vehicle-tab { flex: 1; text-align: center; }
  .vehicle-header { margin: 16px; padding: 16px; }
  .stats-bar { margin: 0 16px 16px; }
  .controls { margin: 0 16px 12px; }
  .table-container { margin: 0 16px 16px; }
  .receipt-section { margin: 0 16px 16px; }
  .form-row { grid-template-columns: 1fr; }
  td, th { padding: 8px 12px; }
  .notes-cell { max-width: 150px; }
}

/* Print */
@media print {
  body { background: #fff; color: #000; }
  .nav, .controls, .btn, .receipt-upload, .modal-overlay { display: none !important; }
  table { border: 1px solid #ccc; }
  td, th { border: 1px solid #ccc; }
}
</style>
</head>
<body>

<nav class="nav">
  <h1>🔧 <span>Vehicle</span> Maintenance</h1>
  <div class="vehicle-tabs" id="vehicleTabs"></div>
  <a href="https://docs.google.com/spreadsheets/d/1_mIU0Ocxof2WalBQucHZj2SIhfGCtQZfzmZZvJStYV4/edit" target="_blank" class="btn btn-secondary" style="margin-left:8px;font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;">📊 Spreadsheet</a>
  <a href="https://drive.google.com/drive/folders/1oI0UsdCtg7IWZoLYcXqbvgBQT7JXQ65g" target="_blank" class="btn btn-secondary" style="font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;">📁 Receipts</a>
</nav>

<div id="vehicleHeader" class="vehicle-header"></div>
<div id="statsBar" class="stats-bar"></div>

<div class="controls">
  <input type="text" class="search-box" id="searchBox" placeholder="Search maintenance records...">
  <div style="display: flex; gap: 6px;">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
  </div>
  <button class="btn btn-primary" onclick="openAddModal()">+ Add Entry</button>
</div>

<div class="table-container">
  <table>
    <thead id="tableHead">
      <tr>
        <th data-sort="done" class="sorted">Status <span class="sort-arrow">↕</span></th>
        <th data-sort="date">Date <span class="sort-arrow">↕</span></th>
        <th data-sort="km">KM <span class="sort-arrow">↕</span></th>
        <th data-sort="work">Work Performed <span class="sort-arrow">↕</span></th>
        <th data-sort="performed_by">Performed By <span class="sort-arrow">↕</span></th>
        <th data-sort="cost">Cost (SAR) <span class="sort-arrow">↕</span></th>
        <th data-sort="notes">Notes <span class="sort-arrow">↕</span></th>
        <th>Receipt</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="8" class="loading"><div class="spinner"></div><br>Loading data...</td></tr>
    </tbody>
  </table>
</div>

<!-- Hidden file input for receipt uploads -->
<input type="file" id="receiptFileInput" accept="image/*" multiple style="display:none">

<!-- Receipt lightbox viewer -->
<div class="lightbox" id="receiptLightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="Receipt">
  <div class="lightbox-info" id="lightboxInfo"></div>
  <div class="lightbox-nav">
    <button onclick="lightboxPrev()">← Prev</button>
    <button class="lightbox-delete" onclick="lightboxDelete()">🗑 Delete</button>
    <button onclick="lightboxNext()">Next →</button>
  </div>
</div>

<!-- Add Entry Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Maintenance Entry</h2>
      <button class="modal-close" onclick="closeAddModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="entryDate" value="">
        </div>
        <div class="form-group">
          <label>Kilometers</label>
          <input type="number" id="entryKm" placeholder="e.g., 195000">
        </div>
      </div>
      <div class="form-group">
        <label>Work Performed</label>
        <textarea id="entryWork" placeholder="Describe the maintenance work..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Performed By</label>
          <input type="text" id="entryBy" placeholder="e.g., Self, Petromin, Ben">
        </div>
        <div class="form-group">
          <label>Cost (SAR)</label>
          <input type="number" id="entryCost" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="entryNotes" placeholder="Additional notes, warranty info, links..."></textarea>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="entryDone">
          <option value="FALSE">Pending</option>
          <option value="TRUE">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1_mIU0Ocxof2WalBQucHZj2SIhfGCtQZfzmZZvJStYV4';
// Each vehicle has its own tab — info in rows 1-2, logs from row 3+
const TAB_GIDS = { 'Xterra': '347377224', 'Fortuner': '84833382' };

// Google Apps Script Web App URL — handles receipt upload/fetch via Google Drive
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzOBF2XyifErlOaVaepqVQDLQJRQ2DngPVHIgQ_2W4fa_vQBIwxvSkUASYUMDpsw3yjfw/exec';

// Receipts are now stored directly in each vehicle log tab (column H)

let VEHICLES = {}; // Populated from each tab's first rows
let currentVehicle = '';
let allData = {};
let currentFilter = 'all';
let searchTerm = '';
let sortCol = 'date';
let sortDir = -1; // -1 = newest first

function buildTabs() {
  const tabsEl = document.getElementById('vehicleTabs');
  tabsEl.innerHTML = '';
  const names = Object.keys(TAB_GIDS);
  if (!currentVehicle && names.length) currentVehicle = names[0];
  names.forEach(name => {
    const icon = VEHICLES[name]?.icon || '🚗';
    const btn = document.createElement('button');
    btn.className = 'vehicle-tab' + (name === currentVehicle ? ' active' : '');
    btn.textContent = icon + ' ' + name;
    btn.onclick = () => switchVehicle(name);
    tabsEl.appendChild(btn);
  });
}

function switchVehicle(name) {
  currentVehicle = name;
  const tabsEl = document.getElementById('vehicleTabs');
  document.querySelectorAll('.vehicle-tab').forEach(t => t.classList.remove('active'));
  [...tabsEl.children].find(t => t.textContent.includes(name))?.classList.add('active');
  render();
}

// TSV row parser
function parseTSVRows(text) {
  return text.split('\n').filter(l => l.trim()).map(line => line.split('\t'));
}

// Generic CSV row parser
function parseCSVRows(text) {
  const lines = text.split('\n').filter(l => l.trim());
  return lines.map(line => {
    const cells = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) { cells.push(current); current = ''; }
      else current += ch;
    }
    cells.push(current);
    return cells;
  });
}

async function fetchVehicleData(name) {
  const gid = TAB_GIDS[name];
  if (!gid) return { info: {}, logs: [], icon: '🚗', estValue: 0 };
  // Use TSV export — CSV endpoint drops some cell values (merged cell bug)
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=tsv&gid=${gid}`;
  const resp = await fetch(url);
  const text = await resp.text();
  return parseMaintenanceLogs(text, true);
}

function parseMaintenanceLogs(text, isTSV) {
  const parsed = isTSV ? parseTSVRows(text) : parseCSVRows(text);
  
  // Row 1 = info headers (Vehicle, Make, Model, Year, VIN, Engine, Icon, EstValue)
  // Row 2 = info values
  // Row 3+ = log header (Done, Date, KM, Work Performed...) then data
  let info = {};
  let icon = '🚗';
  let estValue = 0;
  
  if (parsed.length >= 2) {
    const infoHeaders = parsed[0].map(h => h.trim());
    const infoValues = parsed[1];
    const infoObj = {};
    infoHeaders.forEach((h, idx) => { infoObj[h] = (infoValues[idx] || '').trim(); });
    info = { Make: infoObj.Make || '', Model: infoObj.Model || '', Year: infoObj.Year || '', VIN: infoObj.VIN || '', Engine: infoObj.Engine || '' };
    icon = infoObj.Icon || '🚗';
    estValue = parseFloat(infoObj.EstValue) || 0;
  }
  
  // Find log header row (the one with "Work Performed")
  let headerIdx = -1;
  for (let i = 0; i < parsed.length; i++) {
    if (parsed[i].some(c => c.includes('Work Performed'))) { headerIdx = i; break; }
  }
  if (headerIdx === -1) headerIdx = 2;
  
  const logs = [];
  for (let i = headerIdx + 1; i < parsed.length; i++) {
    const row = parsed[i];
    if (!row[3] || !row[3].trim()) continue;
    logs.push({
      done: row[0]?.toUpperCase() === 'TRUE',
      date: (row[1] || '').trim(),
      km: row[2] ? parseInt(row[2].replace(/,/g, '')) : null,
      work: (row[3] || '').trim(),
      performed_by: (row[4] || '').trim(),
      cost: row[5] ? parseFloat(row[5].replace(/,/g, '')) : null,
      notes: (row[6] || '').trim(),
      receipts: row[7] ? row[7].split(',').map(u => u.trim()).filter(Boolean) : [],
      sheetRow: i + 1  // 1-indexed Sheet row number
    });
  }
  
  return { info, logs, icon, estValue };
}

function render() {
  const data = allData[currentVehicle];
  if (!data) return;
  
  renderHeader(data.info);
  renderStats(data.logs);
  renderTable(data.logs);
}

function renderHeader(info) {
  const el = document.getElementById('vehicleHeader');
  el.innerHTML = `
    <div class="field"><div class="label">Make</div><div class="value">${info.Make || '—'}</div></div>
    <div class="field"><div class="label">Model</div><div class="value">${info.Model || '—'}</div></div>
    <div class="field"><div class="label">Year</div><div class="value">${info.Year || '—'}</div></div>
    <div class="field"><div class="label">VIN</div><div class="value" style="font-size:14px;font-family:monospace">${info.VIN || '—'}</div></div>
    <div class="field"><div class="label">Engine</div><div class="value">${info.Engine || '—'}</div></div>
  `;
}

function renderStats(logs) {
  const d = allData[currentVehicle] || {};
  const totalCost = logs.reduce((s, l) => s + (l.cost || 0), 0);
  const lastService = logs.filter(l => l.date).sort((a,b) => b.date.localeCompare(a.date))[0];
  const maxKm = Math.max(...logs.filter(l => l.km).map(l => l.km), 0);
  const estValue = d.estValue || 0;
  
  // Next oil change — computed from last oil change in logs (every 10,000 km or 6 months)
  let oilHtml = '—';
  const oilLogs = logs.filter(l => l.work.toLowerCase().includes('oil change') && l.done);
  if (oilLogs.length) {
    const lastOil = oilLogs.sort((a,b) => (b.date||'').localeCompare(a.date||''))[0];
    if (lastOil.km) {
      const nextOilKm = lastOil.km + 10000;
      const kmLeft = nextOilKm - maxKm;
      const oilClass = kmLeft < 1000 ? 'danger' : kmLeft < 3000 ? 'warn' : 'green';
      oilHtml = `<div style="font-size:16px;font-weight:700" class="${oilClass}">${nextOilKm.toLocaleString()} km</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">${kmLeft.toLocaleString()} km remaining</div>`;
    }
  }
  
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total MX Cost</div><div class="stat-value green">${totalCost.toLocaleString()} SAR</div></div>
    <div class="stat-card"><div class="stat-label">Est. Car Value</div><div class="stat-value blue">${estValue.toLocaleString()} SAR</div></div>
    <div class="stat-card"><div class="stat-label">Next Oil Change</div>${oilHtml}</div>
    <div class="stat-card"><div class="stat-label">Current KM</div><div class="stat-value">${maxKm > 0 ? maxKm.toLocaleString() : '—'}</div></div>
    <div class="stat-card"><div class="stat-label">Last Service</div><div class="stat-value" style="font-size:16px">${fmtDate(lastService?.date)}</div></div>
  `;
}

function renderTable(logs) {
  let filtered = [...logs];
  
  // Filter
  if (currentFilter === 'done') filtered = filtered.filter(l => l.done);
  if (currentFilter === 'pending') filtered = filtered.filter(l => !l.done);
  
  // Search
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(l => 
      l.work.toLowerCase().includes(q) || 
      l.performed_by.toLowerCase().includes(q) ||
      l.notes.toLowerCase().includes(q) ||
      l.date.includes(q)
    );
  }
  
  // Sort
  filtered.sort((a, b) => {
    let va, vb;
    switch(sortCol) {
      case 'done': va = a.done ? 1 : 0; vb = b.done ? 1 : 0; break;
      case 'date': va = a.date || '0000'; vb = b.date || '0000'; break;
      case 'km': va = a.km || 0; vb = b.km || 0; break;
      case 'cost': va = a.cost || 0; vb = b.cost || 0; break;
      case 'work': va = a.work.toLowerCase(); vb = b.work.toLowerCase(); break;
      case 'performed_by': va = a.performed_by.toLowerCase(); vb = b.performed_by.toLowerCase(); break;
      default: va = a.date || '0000'; vb = b.date || '0000';
    }
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
  
  const tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-dim)">No records found</td></tr>';
    return;
  }
  
  tbody.innerHTML = filtered.map(l => {
    const sr = l.sheetRow || 0;
    const rcpts = l.receipts || [];
    const fileIds = rcpts.map(u => { const m = u.match(/\/d\/([^/]+)/); return m ? m[1] : ''; }).filter(Boolean);
    
    let receiptHtml;
    if (fileIds.length) {
      receiptHtml = `<td class="receipt-cell"><div class="receipt-badge">
        <img class="receipt-thumb" src="https://drive.google.com/thumbnail?id=${fileIds[0]}&sz=s200" onclick="openLightbox(${JSON.stringify(fileIds).replace(/"/g, '&quot;')}, 0)" alt="Receipt">
        ${fileIds.length > 1 ? `<span class="receipt-count">+${fileIds.length - 1}</span>` : ''}
        <button class="btn-icon" title="Add more" onclick="triggerUpload(${sr})" style="font-size:14px;margin-left:2px;">+</button>
      </div></td>`;
    } else {
      receiptHtml = `<td class="receipt-cell"><button class="btn-icon" title="Add receipt" onclick="triggerUpload(${sr})">📷</button></td>`;
    }
    
    const rcptLinks = rcpts.map((u, i) => ` <a href="${u}" target="_blank" style="color:var(--accent);text-decoration:none">📎${rcpts.length > 1 ? (i+1) : ''}</a>`).join('');
    
    return `<tr>
      <td class="done-cell">${l.done ? '<span class="done-check">✓</span>' : '<span class="done-pending">○</span>'}</td>
      <td class="date-cell">${fmtDate(l.date)}</td>
      <td class="km-cell">${l.km ? l.km.toLocaleString() : '—'}</td>
      <td>${escHtml(l.work)}</td>
      <td>${escHtml(l.performed_by) || '—'}</td>
      <td class="cost-cell">${l.cost != null ? l.cost.toLocaleString() + ' SAR' : '—'}</td>
      <td class="notes-cell" title="${escHtml(l.notes)}">${escHtml(truncate(l.notes, 80))}${rcptLinks}</td>
      ${receiptHtml}
    </tr>`;
  }).join('');
}

// --- Per-row receipt system (Drive links stored in Sheet column H) ---

function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

let pendingSheetRow = 0;

function triggerUpload(sheetRow) {
  pendingSheetRow = sheetRow;
  document.getElementById('receiptFileInput').click();
}

document.getElementById('receiptFileInput').addEventListener('change', async function(e) {
  if (!pendingSheetRow) return;
  const files = e.target.files;
  
  for (const file of files) {
    const base64 = await fileToBase64(file);
    try {
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'upload',
          vehicle: currentVehicle,
          sheetRow: pendingSheetRow,
          fileName: `${currentVehicle}_${file.name}`,
          mimeType: file.type || 'image/jpeg',
          base64: base64
        })
      });
      const result = await resp.json();
      if (result.success) {
        // Update in-memory log so it shows immediately
        const logs = allData[currentVehicle]?.logs || [];
        const log = logs.find(l => l.sheetRow === pendingSheetRow);
        if (log) {
          if (!log.receipts) log.receipts = [];
          log.receipts.push(result.fileUrl);
        }
      }
    } catch (err) {
      alert('Upload failed: ' + err.message);
    }
  }
  
  pendingSheetRow = 0;
  this.value = '';
  render();
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Lightbox — works with array of fileIds
let lightboxFileIds = [];
let lightboxIdx = 0;

function openLightbox(fileIds, idx) {
  if (!fileIds || !fileIds.length) return;
  lightboxFileIds = fileIds;
  lightboxIdx = idx || 0;
  showLightboxImage();
  document.getElementById('receiptLightbox').classList.add('active');
}

function closeLightbox() {
  document.getElementById('receiptLightbox').classList.remove('active');
}

function showLightboxImage() {
  const fid = lightboxFileIds[lightboxIdx];
  document.getElementById('lightboxImg').src = `https://drive.google.com/thumbnail?id=${fid}&sz=s800`;
  document.getElementById('lightboxInfo').textContent = `Receipt ${lightboxIdx + 1} of ${lightboxFileIds.length}`;
}

function lightboxPrev() {
  lightboxIdx = (lightboxIdx - 1 + lightboxFileIds.length) % lightboxFileIds.length;
  showLightboxImage();
}

function lightboxNext() {
  lightboxIdx = (lightboxIdx + 1) % lightboxFileIds.length;
  showLightboxImage();
}

async function lightboxDelete() {
  if (!confirm('Delete this receipt from Google Drive?')) return;
  const fid = lightboxFileIds[lightboxIdx];
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', fileId: fid, vehicle: currentVehicle })
    });
    lightboxFileIds.splice(lightboxIdx, 1);
    const fileUrl = `https://drive.google.com/file/d/${fid}/view`;
    const logs = allData[currentVehicle]?.logs || [];
    logs.forEach(l => { if (l.receipts) l.receipts = l.receipts.filter(u => u !== fileUrl); });
    if (lightboxFileIds.length === 0) {
      closeLightbox();
    } else {
      lightboxIdx = Math.min(lightboxIdx, lightboxFileIds.length - 1);
      showLightboxImage();
    }
    render();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  }
}

// Event handlers
document.getElementById('searchBox').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderTable(allData[currentVehicle]?.logs || []);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable(allData[currentVehicle]?.logs || []);
  });
});

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = -1; }
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    renderTable(allData[currentVehicle]?.logs || []);
  });
});

// Lightbox close on background click
document.getElementById('receiptLightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

// Add entry modal
function openAddModal() {
  document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

function saveEntry() {
  const entry = {
    done: document.getElementById('entryDone').value === 'TRUE',
    date: document.getElementById('entryDate').value,
    km: parseInt(document.getElementById('entryKm').value) || null,
    work: document.getElementById('entryWork').value,
    performed_by: document.getElementById('entryBy').value,
    cost: parseFloat(document.getElementById('entryCost').value) || null,
    notes: document.getElementById('entryNotes').value
  };
  
  if (!entry.work) { alert('Please enter work performed'); return; }
  
  // Save to local storage (pending sync to sheet)
  const key = `pending_${currentVehicle}`;
  const pending = JSON.parse(localStorage.getItem(key) || '[]');
  pending.push(entry);
  localStorage.setItem(key, JSON.stringify(pending));
  
  // Add to current data
  allData[currentVehicle].logs.push(entry);
  render();
  closeAddModal();
  
  // Clear form
  ['entryWork', 'entryBy', 'entryCost', 'entryNotes', 'entryKm'].forEach(id => document.getElementById(id).value = '');
}

// Utility
function escHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function truncate(s, n) { return s && s.length > n ? s.substring(0, n) + '...' : (s || ''); }
function fmtDate(raw) {
  if (!raw) return '—';
  // Parse various formats: YYYY-MM-DD, M/D/YY, M/D/YYYY, MM/DD/YY
  let d;
  if (raw.includes('-')) {
    d = new Date(raw + 'T00:00:00');
  } else if (raw.includes('/')) {
    const parts = raw.split('/');
    let y = parseInt(parts[2]);
    if (y < 100) y += 2000;
    d = new Date(y, parseInt(parts[0]) - 1, parseInt(parts[1]));
  } else { return raw; }
  if (isNaN(d.getTime())) return raw;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }).toUpperCase();
}

// Boot — fetch all vehicle data from each tab
async function init() {
  buildTabs(); // initial tabs from TAB_GIDS keys
  
  for (const name of Object.keys(TAB_GIDS)) {
    try {
      allData[name] = await fetchVehicleData(name);
      VEHICLES[name] = { icon: allData[name].icon, estValue: allData[name].estValue };
      const pending = JSON.parse(localStorage.getItem(`pending_${name}`) || '[]');
      allData[name].logs.push(...pending);
    } catch (e) {
      console.error(`Failed to load ${name}:`, e);
      allData[name] = { info: {}, logs: [], icon: '🚗', estValue: 0 };
    }
  }
  
  buildTabs(); // rebuild with icons from data
  render();
}

init();
